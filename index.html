<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule & Todo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f0e8; font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; color: #3C3489; min-height: 100vh; }
.app { max-width: 600px; margin: 0 auto; padding: 1.2rem 1rem 3rem; }
.header { text-align: center; margin-bottom: 1.5rem; padding: 1.2rem; background: #ffffff; border-radius: 14px; border: 1px solid #CECBF6; }
.header h1 { font-size: 20px; color: #7F77DD; font-weight: bold; margin-bottom: 2px; }
.header p { font-size: 12px; color: #AFA9EC; }
.test-btn { display: block; width: 100%; padding: 10px; margin-bottom: 1rem; background: #EEEDFE; border: 1px solid #CECBF6; border-radius: 10px; color: #7F77DD; font-size: 13px; font-weight: bold; cursor: pointer; text-align: center; }
.test-btn:hover { background: #d8d5f7; }
.tabs { display: flex; gap: 8px; margin-bottom: 1rem; }
.tab { flex: 1; padding: 10px; font-size: 14px; font-weight: bold; border: 2px solid #CECBF6; border-radius: 10px; background: #ffffff; color: #AFA9EC; cursor: pointer; text-align: center; transition: all 0.2s; }
.tab.active { background: #7F77DD; border-color: #7F77DD; color: #ffffff; }
.section { display: none; }
.section.active { display: block; }
.card { background: #ffffff; border: 1px solid #CECBF6; border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: 1rem; }
.card-title { font-size: 14px; font-weight: bold; color: #3C3489; margin-bottom: 10px; }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-header span { font-size: 15px; font-weight: bold; color: #7F77DD; }
.cal-nav { background: none; border: 1px solid #CECBF6; border-radius: 6px; width: 30px; height: 30px; cursor: pointer; font-size: 16px; color: #7F77DD; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-day-name { text-align: center; font-size: 11px; color: #AFA9EC; padding: 4px 0; font-weight: bold; }
.cal-day-name:first-child { color: #e57373; }
.cal-day-name:last-child { color: #7F77DD; }
.cal-day { text-align: center; padding: 6px 2px; font-size: 13px; border-radius: 6px; cursor: pointer; min-height: 34px; position: relative; }
.cal-day:hover { background: #EEEDFE; }
.cal-day.today { background: #EEEDFE; font-weight: bold; color: #7F77DD; }
.cal-day.selected { background: #7F77DD; color: #ffffff !important; font-weight: bold; }
.cal-day.has-event::after { content: '●'; font-size: 6px; color: #7F77DD; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); }
.cal-day.selected.has-event::after { color: #ffffff; }
.cal-day.empty { cursor: default; }
.cal-day.sunday { color: #e57373; }
.cal-day.saturday { color: #7F77DD; }
.form-row { margin-bottom: 10px; }
.form-row label { font-size: 12px; color: #AFA9EC; display: block; margin-bottom: 4px; }
.form-row input, .form-row select, .form-row textarea { width: 100%; padding: 8px 10px; border: 1px solid #CECBF6; border-radius: 8px; font-size: 14px; color: #3C3489; background: #faf8ff; font-family: inherit; }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: none; border-color: #AFA9EC; }
.form-row textarea { min-height: 60px; resize: none; }
.btn-row { display: flex; gap: 8px; }
.btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; border: none; transition: all 0.15s; }
.btn-primary { background: #7F77DD; color: #ffffff; flex: 1; }
.btn-primary:hover { background: #534AB7; }
.btn-cancel { background: #f5f0e8; color: #AFA9EC; border: 1px solid #CECBF6; cursor: pointer; border-radius: 8px; padding: 10px 16px; font-size: 14px; font-weight: bold; }

/* 予定リスト */
.event-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0ecf8; }
.event-item:last-child { border-bottom: none; }
.event-dot { width: 10px; height: 10px; border-radius: 50%; background: #7F77DD; flex-shrink: 0; margin-top: 4px; }
.event-info { flex: 1; }
.event-title { font-size: 14px; font-weight: bold; color: #3C3489; }
.event-time { font-size: 12px; color: #AFA9EC; margin-top: 2px; }
.event-memo { font-size: 12px; color: #7F77DD; margin-top: 2px; }
.event-actions { display: flex; gap: 4px; flex-shrink: 0; }
.btn-edit { background: #EEEDFE; border: 1px solid #CECBF6; border-radius: 6px; color: #7F77DD; cursor: pointer; font-size: 12px; padding: 4px 8px; }
.btn-edit:hover { background: #d8d5f7; }
.btn-del { background: none; border: none; color: #CECBF6; cursor: pointer; font-size: 16px; padding: 4px; }
.btn-del:hover { color: #e57373; }
.empty-msg { font-size: 13px; color: #AFA9EC; text-align: center; padding: 1rem 0; }

/* 編集モーダル */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.show { display: flex; }
.modal { background: #ffffff; border-radius: 14px; padding: 1.2rem; width: 100%; max-width: 480px; border: 1px solid #CECBF6; }
.modal-title { font-size: 15px; font-weight: bold; color: #3C3489; margin-bottom: 1rem; }

/* TODO */
.todo-input-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.todo-input-row input { flex: 1; padding: 10px 12px; border: 1px solid #CECBF6; border-radius: 8px; font-size: 14px; color: #3C3489; background: #faf8ff; font-family: inherit; }
.todo-input-row input:focus { outline: none; border-color: #AFA9EC; }
.todo-input-row button { padding: 10px 16px; background: #7F77DD; color: #ffffff; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
.todo-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0ecf8; }
.todo-item:last-child { border-bottom: none; }
.todo-check { width: 20px; height: 20px; border: 2px solid #CECBF6; border-radius: 5px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-size: 12px; }
.todo-check.done { background: #7F77DD; border-color: #7F77DD; color: #ffffff; }
.todo-text { flex: 1; font-size: 14px; color: #3C3489; word-break: break-all; }
.todo-text.done { text-decoration: line-through; color: #AFA9EC; }
.todo-actions { display: flex; gap: 4px; flex-shrink: 0; }
.todo-filter { display: flex; gap: 6px; margin-bottom: 10px; }
.filter-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid #CECBF6; background: #ffffff; color: #AFA9EC; font-size: 12px; cursor: pointer; }
.filter-btn.active { background: #7F77DD; border-color: #7F77DD; color: #ffffff; }

/* TODO編集行 */
.todo-edit-row { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f0ecf8; }
.todo-edit-row input { flex: 1; padding: 6px 10px; border: 1px solid #AFA9EC; border-radius: 6px; font-size: 14px; color: #3C3489; background: #faf8ff; font-family: inherit; }
.todo-edit-row input:focus { outline: none; border-color: #7F77DD; }
.btn-save { background: #7F77DD; border: none; border-radius: 6px; color: #ffffff; cursor: pointer; font-size: 12px; padding: 6px 10px; font-weight: bold; }
.btn-cancel-sm { background: #f5f0e8; border: 1px solid #CECBF6; border-radius: 6px; color: #AFA9EC; cursor: pointer; font-size: 12px; padding: 6px 10px; }

.notify-banner { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); background: #7F77DD; color: #ffffff; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: bold; z-index: 999; display: none; max-width: 90%; text-align: center; box-shadow: 0 4px 12px rgba(127,119,221,0.4); }
</style>
</head>
<body>
<div class="notify-banner" id="notifyBanner"></div>

<!-- 予定編集モーダル -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">✏️ 予定を編集</div>
    <div class="form-row"><label>タイトル</label><input type="text" id="editTitle"></div>
    <div class="form-row"><label>日時</label><input type="datetime-local" id="editDatetime"></div>
    <div class="form-row">
      <label>リマインド</label>
      <select id="editRemind">
        <option value="0">時間ちょうど</option>
        <option value="5">5分前</option>
        <option value="10">10分前</option>
        <option value="30">30分前</option>
        <option value="60">1時間前</option>
        <option value="1440">1日前</option>
      </select>
    </div>
    <div class="form-row"><label>メモ（任意）</label><textarea id="editMemo"></textarea></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存する</button>
    </div>
  </div>
</div>

<div class="app">
  <div class="header">
    <h1>✦ Schedule & Todo ✦</h1>
    <p>予定とやることを、ひとつにまとめて</p>
  </div>

  <button class="test-btn" onclick="testSound()">🔔 通知音テスト（最初に一度タップしてください）</button>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('schedule')">📅 スケジュール</button>
    <button class="tab" onclick="switchTab('todo')">✓ TODOリスト</button>
  </div>

  <div class="section active" id="section-schedule">
    <div class="card">
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
        <span id="calTitle"></span>
        <button class="cal-nav" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid">
        <div class="cal-day-name">日</div><div class="cal-day-name">月</div><div class="cal-day-name">火</div>
        <div class="cal-day-name">水</div><div class="cal-day-name">木</div><div class="cal-day-name">金</div><div class="cal-day-name">土</div>
      </div>
      <div class="cal-grid" id="calDays"></div>
    </div>

    <div class="card">
      <div class="card-title" id="selectedDateLabel">予定を追加</div>
      <div class="form-row"><label>タイトル</label><input type="text" id="evTitle" placeholder="例：美容院、打ち合わせ"></div>
      <div class="form-row"><label>日時</label><input type="datetime-local" id="evDatetime"></div>
      <div class="form-row">
        <label>リマインド</label>
        <select id="evRemind">
          <option value="0">時間ちょうど</option>
          <option value="5">5分前</option>
          <option value="10">10分前</option>
          <option value="30">30分前</option>
          <option value="60">1時間前</option>
          <option value="1440">1日前</option>
        </select>
      </div>
      <div class="form-row"><label>メモ（任意）</label><textarea id="evMemo" placeholder="備考など"></textarea></div>
      <div class="btn-row"><button class="btn btn-primary" onclick="addEvent()">追加する</button></div>
    </div>

    <div class="card">
      <div class="card-title">📋 すべての予定</div>
      <div id="eventList"></div>
    </div>
  </div>

  <div class="section" id="section-todo">
    <div class="card">
      <div class="card-title">やることリスト</div>
      <div class="todo-input-row">
        <input type="text" id="todoInput" placeholder="やることを入力してください" onkeydown="if(event.key==='Enter')addTodo()">
        <button onclick="addTodo()">追加</button>
      </div>
      <div class="todo-filter">
        <button class="filter-btn active" onclick="filterTodo('all',this)">すべて</button>
        <button class="filter-btn" onclick="filterTodo('active',this)">未完了</button>
        <button class="filter-btn" onclick="filterTodo('done',this)">完了済み</button>
      </div>
      <div id="todoList"></div>
    </div>
  </div>
</div>

<script>
// ===== 音 =====
let audioCtx = null;
function getAudioCtx() { if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playNotifySound() {
  try {
    const ctx=getAudioCtx();
    const notes=[880,1046,1318];
    notes.forEach((freq,i)=>{
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type='sine'; osc.frequency.setValueAtTime(freq,ctx.currentTime+i*0.18);
      gain.gain.setValueAtTime(0,ctx.currentTime+i*0.18);
      gain.gain.linearRampToValueAtTime(0.4,ctx.currentTime+i*0.18+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.18+0.35);
      osc.start(ctx.currentTime+i*0.18); osc.stop(ctx.currentTime+i*0.18+0.35);
    });
  } catch(e) { console.log('音エラー:',e); }
}
function testSound() { playNotifySound(); showNotify('🔔 通知音テスト！これがリマインド時に鳴ります'); }

// ===== データ =====
let events=JSON.parse(localStorage.getItem('schedule_events')||'[]');
let todos=JSON.parse(localStorage.getItem('schedule_todos')||'[]');
function saveEvents(){localStorage.setItem('schedule_events',JSON.stringify(events));}
function saveTodos(){localStorage.setItem('schedule_todos',JSON.stringify(todos));}

// ===== タブ =====
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='schedule')||(i===1&&tab==='todo')));
  document.getElementById('section-schedule').classList.toggle('active',tab==='schedule');
  document.getElementById('section-todo').classList.toggle('active',tab==='todo');
}

// ===== カレンダー =====
let currentYear=new Date().getFullYear(), currentMonth=new Date().getMonth(), selectedDate=null;
function renderCalendar() {
  const today=new Date(), firstDay=new Date(currentYear,currentMonth,1).getDay(), daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  document.getElementById('calTitle').textContent=`${currentYear}年${currentMonth+1}月`;
  const container=document.getElementById('calDays'); container.innerHTML='';
  for(let i=0;i<firstDay;i++){const el=document.createElement('div');el.className='cal-day empty';container.appendChild(el);}
  for(let d=1;d<=daysInMonth;d++){
    const el=document.createElement('div');
    const dateStr=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(currentYear,currentMonth,d).getDay();
    let cls='cal-day';
    if(dow===0)cls+=' sunday'; if(dow===6)cls+=' saturday';
    if(d===today.getDate()&&currentMonth===today.getMonth()&&currentYear===today.getFullYear())cls+=' today';
    if(selectedDate===dateStr)cls+=' selected';
    if(events.some(e=>e.datetime&&e.datetime.startsWith(dateStr)))cls+=' has-event';
    el.className=cls; el.textContent=d; el.onclick=()=>selectDate(dateStr,d); container.appendChild(el);
  }
}
function selectDate(dateStr,d){
  selectedDate=dateStr;
  document.getElementById('evDatetime').value=dateStr+'T09:00';
  document.getElementById('selectedDateLabel').textContent=`${currentYear}年${currentMonth+1}月${d}日の予定を追加`;
  renderCalendar();
}
function changeMonth(dir){
  currentMonth+=dir;
  if(currentMonth>11){currentMonth=0;currentYear++;} if(currentMonth<0){currentMonth=11;currentYear--;}
  renderCalendar();
}

// ===== 予定追加 =====
function addEvent(){
  const title=document.getElementById('evTitle').value.trim();
  const datetime=document.getElementById('evDatetime').value;
  const remind=parseInt(document.getElementById('evRemind').value);
  const memo=document.getElementById('evMemo').value.trim();
  if(!title||!datetime){alert('タイトルと日時を入力してください');return;}
  const ev={id:Date.now(),title,datetime,remind,memo};
  events.push(ev); events.sort((a,b)=>a.datetime.localeCompare(b.datetime)); saveEvents();
  document.getElementById('evTitle').value=''; document.getElementById('evMemo').value='';
  renderCalendar(); renderEvents(); scheduleReminder(ev); showNotify('✅ 予定を追加しました！');
}

function deleteEvent(id){events=events.filter(e=>e.id!==id);saveEvents();renderCalendar();renderEvents();}

// ===== 予定編集 =====
let editingId = null;
function openEditModal(id) {
  const ev=events.find(e=>e.id===id); if(!ev)return;
  editingId=id;
  document.getElementById('editTitle').value=ev.title;
  document.getElementById('editDatetime').value=ev.datetime;
  document.getElementById('editRemind').value=ev.remind;
  document.getElementById('editMemo').value=ev.memo||'';
  document.getElementById('editModal').classList.add('show');
}
function closeModal(){document.getElementById('editModal').classList.remove('show');editingId=null;}
function saveEdit(){
  const ev=events.find(e=>e.id===editingId); if(!ev)return;
  const title=document.getElementById('editTitle').value.trim();
  const datetime=document.getElementById('editDatetime').value;
  if(!title||!datetime){alert('タイトルと日時を入力してください');return;}
  ev.title=title; ev.datetime=datetime;
  ev.remind=parseInt(document.getElementById('editRemind').value);
  ev.memo=document.getElementById('editMemo').value.trim();
  events.sort((a,b)=>a.datetime.localeCompare(b.datetime)); saveEvents();
  closeModal(); renderCalendar(); renderEvents(); showNotify('✅ 予定を更新しました！');
}

function renderEvents(){
  const container=document.getElementById('eventList');
  if(events.length===0){container.innerHTML='<div class="empty-msg">予定はまだありません</div>';return;}
  container.innerHTML=events.map(ev=>{
    const dt=new Date(ev.datetime);
    const dateLabel=`${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    return `<div class="event-item">
      <div class="event-dot"></div>
      <div class="event-info">
        <div class="event-title">${ev.title}</div>
        <div class="event-time">📅 ${dateLabel}</div>
        ${ev.memo?`<div class="event-memo">📝 ${ev.memo}</div>`:''}
      </div>
      <div class="event-actions">
        <button class="btn-edit" onclick="openEditModal(${ev.id})">✏️ 編集</button>
        <button class="btn-del" onclick="deleteEvent(${ev.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

function scheduleReminder(ev){
  const fireTime=new Date(ev.datetime).getTime()-ev.remind*60000;
  const diff=fireTime-Date.now();
  if(diff>0&&diff<86400000*7){
    setTimeout(()=>{
      playNotifySound(); showNotify(`⏰ ${ev.title} のリマインドです！`);
      if(Notification.permission==='granted') new Notification('⏰ リマインド',{body:ev.title});
    },diff);
  }
}

if('Notification' in window && Notification.permission==='default') Notification.requestPermission();

// ===== TODO =====
let todoFilter='all', editingTodoId=null;

function addTodo(){
  const text=document.getElementById('todoInput').value.trim(); if(!text)return;
  todos.push({id:Date.now(),text,done:false}); saveTodos();
  document.getElementById('todoInput').value=''; renderTodos();
}
function toggleTodo(id){const t=todos.find(t=>t.id===id);if(t)t.done=!t.done;saveTodos();renderTodos();}
function deleteTodo(id){todos=todos.filter(t=>t.id!==id);saveTodos();renderTodos();}
function filterTodo(f,btn){
  todoFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderTodos();
}
function startEditTodo(id){editingTodoId=id;renderTodos();}
function cancelEditTodo(){editingTodoId=null;renderTodos();}
function saveEditTodo(id){
  const input=document.getElementById(`todoEditInput_${id}`);
  if(!input)return;
  const text=input.value.trim(); if(!text)return;
  const t=todos.find(t=>t.id===id); if(t)t.text=text;
  saveTodos(); editingTodoId=null; renderTodos(); showNotify('✅ TODOを更新しました！');
}

function renderTodos(){
  const container=document.getElementById('todoList');
  const filtered=todos.filter(t=>{
    if(todoFilter==='active')return !t.done;
    if(todoFilter==='done')return t.done;
    return true;
  });
  if(filtered.length===0){container.innerHTML='<div class="empty-msg">TODOはまだありません</div>';return;}
  container.innerHTML=filtered.map(t=>{
    if(editingTodoId===t.id){
      return `<div class="todo-edit-row">
        <input type="text" id="todoEditInput_${t.id}" value="${t.text}" onkeydown="if(event.key==='Enter')saveEditTodo(${t.id})">
        <button class="btn-save" onclick="saveEditTodo(${t.id})">保存</button>
        <button class="btn-cancel-sm" onclick="cancelEditTodo()">取消</button>
      </div>`;
    }
    return `<div class="todo-item">
      <div class="todo-check ${t.done?'done':''}" onclick="toggleTodo(${t.id})">${t.done?'✓':''}</div>
      <div class="todo-text ${t.done?'done':''}">${t.text}</div>
      <div class="todo-actions">
        <button class="btn-edit" onclick="startEditTodo(${t.id})">✏️</button>
        <button class="btn-del" onclick="deleteTodo(${t.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ===== 通知バナー =====
function showNotify(msg){
  const b=document.getElementById('notifyBanner'); b.textContent=msg; b.style.display='block';
  setTimeout(()=>b.style.display='none',4000);
}

// ===== 初期化 =====
renderCalendar(); renderEvents(); renderTodos();
events.forEach(ev=>scheduleReminder(ev));
const now=new Date();
const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
document.getElementById('evDatetime').value=todayStr+'T09:00';
</script>
</body>
</html>
