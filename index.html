<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule & Remind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @keyframes bounce-short {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .animate-bounce-short {
      animation: bounce-short 0.5s ease-in-out 3;
    }
    /* カレンダーのドット */
    .task-dot {
      position: absolute;
      bottom: 4px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-20">

  <header class="bg-indigo-600 text-white p-6 rounded-b-3xl shadow-md mb-8">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-bell text-2xl"></i>
        <h1 class="text-2xl font-bold tracking-tight">Schedule & Remind</h1>
      </div>
      <button onclick="testNotification()" class="text-sm bg-indigo-500 hover:bg-indigo-400 px-4 py-2 rounded-xl transition-colors font-medium shadow-sm">
        通知テスト
      </button>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <div class="lg:col-span-5 space-y-6">
      
      <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-lg font-bold text-slate-700 flex items-center gap-2">
            <i class="fa-regular fa-calendar-days text-indigo-500"></i> カレンダー
          </h2>
          <div class="flex items-center gap-2 bg-slate-50 rounded-full p-1 border border-slate-100">
            <button onclick="changeMonth(-1)" class="p-1.5 hover:bg-white rounded-full transition-colors shadow-sm w-8 h-8 flex items-center justify-center">
              <i class="fa-solid fa-chevron-left text-sm"></i>
            </button>
            <span id="calendar-title" class="font-semibold text-sm w-24 text-center text-slate-700"></span>
            <button onclick="changeMonth(1)" class="p-1.5 hover:bg-white rounded-full transition-colors shadow-sm w-8 h-8 flex items-center justify-center">
              <i class="fa-solid fa-chevron-right text-sm"></i>
            </button>
          </div>
        </div>
        
        <div class="grid grid-cols-7 gap-1 text-center text-xs mb-2">
          <div class="font-medium py-1 text-red-400">日</div>
          <div class="font-medium py-1 text-slate-400">月</div>
          <div class="font-medium py-1 text-slate-400">火</div>
          <div class="font-medium py-1 text-slate-400">水</div>
          <div class="font-medium py-1 text-slate-400">木</div>
          <div class="font-medium py-1 text-slate-400">金</div>
          <div class="font-medium py-1 text-blue-400">土</div>
        </div>
        <div id="calendar-grid" class="grid grid-cols-7 gap-1">
          </div>
      </section>

      <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
        <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-700">
          <i class="fa-solid fa-plus text-indigo-500"></i> 新しい予定を追加
        </h2>
        <form id="task-form" onsubmit="addTask(event)" class="space-y-4">
          <div>
            <input type="text" id="task-title" placeholder="予定のタイトル（例：ミーティング）" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-colors" required>
          </div>
          
          <div class="grid grid-cols-2 gap-4">
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                <i class="fa-regular fa-calendar"></i>
              </div>
              <input type="date" id="task-date" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm" required>
            </div>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                <i class="fa-regular fa-clock"></i>
              </div>
              <input type="time" id="task-time" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm" required>
            </div>
          </div>

          <div class="flex items-center gap-3">
            <label class="text-sm font-medium text-slate-600 whitespace-nowrap">リマインド:</label>
            <select id="task-reminder" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium text-slate-700">
              <option value="0">時間ちょうど</option>
              <option value="5">5分前</option>
              <option value="10">10分前</option>
              <option value="30">30分前</option>
              <option value="60">1時間前</option>
              <option value="1440">1日前</option>
            </select>
          </div>

          <button type="submit" id="submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3.5 rounded-xl transition-colors shadow-sm flex items-center justify-center gap-2 mt-2 disabled:opacity-50 disabled:cursor-not-allowed">
            <i class="fa-solid fa-plus"></i> 追加する
          </button>
        </form>
      </section>
    </div>

    <div class="lg:col-span-7">
      <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 min-h-[500px]">
        <div class="flex items-center justify-between mb-6 border-b border-slate-100 pb-4">
          <h2 class="text-lg font-bold text-slate-700 flex items-center gap-2">
            <i class="fa-solid fa-list-check text-indigo-500"></i> 
            <span id="list-title">すべての予定</span>
          </h2>
          <button id="show-all-btn" onclick="setFilterDate(null)" class="hidden text-xs font-medium text-indigo-600 bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded-lg transition-colors">
            すべて表示
          </button>
        </div>
        
        <div id="task-list" class="space-y-3">
          </div>
      </section>
    </div>
  </main>

  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none">
  </div>

  <script>
    // === 状態管理 ===
    let tasks = [];
    let currentMonth = new Date();
    let filterDate = null;

    // === 初期化 ===
    function init() {
      const saved = localStorage.getItem('schedule_tasks_html');
      if (saved) {
        tasks = JSON.parse(saved);
      }

      const now = new Date();
      document.getElementById('task-date').value = now.toISOString().split('T')[0];
      now.setHours(now.getHours() + 1);
      document.getElementById('task-time').value = now.toTimeString().substring(0, 5);

      if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
        Notification.requestPermission();
      }

      document.getElementById('task-title').addEventListener('input', function() {
        document.getElementById('submit-btn').disabled = !this.value.trim();
      });
      document.getElementById('submit-btn').disabled = true;

      updateUI();
      setInterval(checkReminders, 10000);
    }

    // === データ保存と画面更新 ===
    function saveData() {
      localStorage.setItem('schedule_tasks_html', JSON.stringify(tasks));
    }

    function updateUI() {
      renderCalendar();
      renderTasks();
    }

    // === カレンダー関連 ===
    function changeMonth(offset) {
      currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + offset, 1);
      updateUI();
    }

    function setFilterDate(dateStr) {
      if (filterDate === dateStr) {
        filterDate = null;
      } else {
        filterDate = dateStr;
        document.getElementById('task-date').value = dateStr;
      }
      updateUI();
    }

    function renderCalendar() {
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      document.getElementById('calendar-title').textContent = `${year}年 ${month + 1}月`;

      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();
      const todayStr = new Date().toISOString().split('T')[0];

      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = '';

      for (let i = 0; i < firstDay; i++) {
        grid.innerHTML += `<div class="p-2"></div>`;
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const hasTask = tasks.some(t => t.date === dateStr && !t.completed);
        const isSelected = filterDate === dateStr;
        const isToday = todayStr === dateStr;

        let btnClass = "relative p-2 w-full aspect-square flex flex-col items-center justify-center rounded-full text-sm transition-all ";
        if (isSelected) {
          btnClass += "bg-indigo-600 text-white shadow-md";
        } else if (isToday) {
          btnClass += "bg-indigo-50 text-indigo-700 font-bold border border-indigo-200";
        } else {
          btnClass += "hover:bg-slate-100 text-slate-700 cursor-pointer";
        }

        let dotClass = isSelected ? "bg-white" : "bg-orange-500";
        let dotHtml = hasTask ? `<span class="task-dot ${dotClass}"></span>` : '';

        grid.innerHTML += `
          <button onclick="setFilterDate('${dateStr}')" class="${btnClass}">
            <span>${d}</span>
            ${dotHtml}
          </button>
        `;
      }
    }

    // === タスク一覧表示 ===
    function renderTasks() {
      const list = document.getElementById('task-list');
      const showAllBtn = document.getElementById('show-all-btn');
      const listTitle = document.getElementById('list-title');

      let displayedTasks = tasks;
      if (filterDate) {
        displayedTasks = tasks.filter(t => t.date === filterDate);
        const [y, m, d] = filterDate.split('-');
        listTitle.textContent = `${y}年${parseInt(m)}月${parseInt(d)}日の予定`;
        showAllBtn.classList.remove('hidden');
      } else {
        listTitle.textContent = "すべての予定";
        showAllBtn.classList.add('hidden');
      }

      if (displayedTasks.length === 0) {
        list.innerHTML = `
          <div class="text-center py-16">
            <i class="fa-regular fa-calendar-xmark text-5xl text-slate-200 mb-4"></i>
            <p class="text-slate-500 font-medium">予定はありません</p>
            ${filterDate ? '<p class="text-sm text-slate-400 mt-1">他の日付を選択するか、新しく予定を追加してください</p>' : ''}
          </div>
        `;
        return;
      }

      list.innerHTML = '';
      const now = new Date();

      displayedTasks.forEach(task => {
        const taskDateTime = new Date(`${task.date}T${task.time}`);
        const isPast = taskDateTime < now && !task.completed;

        let containerClass = "group flex items-center justify-between p-4 rounded-2xl border transition-all ";
        if (task.completed) containerClass += "bg-slate-50 border-slate-200 opacity-60";
        else if (isPast) containerClass += "bg-red-50 border-red-200";
        else containerClass += "bg-white border-slate-200 shadow-sm hover:shadow-md hover:border-indigo-200";

        let checkClass = "w-7 h-7 rounded-full flex items-center justify-center border-2 flex-shrink-0 transition-all cursor-pointer ";
        if (task.completed) checkClass += "bg-green-500 border-green-500 text-white shadow-sm";
        else checkClass += "border-slate-300 hover:border-indigo-500 text-transparent";

        let titleClass = `font-bold truncate text-lg ${task.completed ? 'line-through text-slate-500' : 'text-slate-800'}`;
        let dateColor = isPast && !task.completed ? 'text-red-600 font-bold' : 'text-slate-500 font-medium';
        
        let reminderText = task.reminderOffset === "0" ? '時間ちょうど' : `${task.reminderOffset}分前`;

        list.innerHTML += `
          <div class="${containerClass}">
            <div class="flex items-center gap-4 flex-1">
              <button onclick="toggleComplete('${task.id}')" class="${checkClass}">
                <i class="fa-solid fa-check text-xs"></i>
              </button>
              
              <div class="flex-1 min-w-0">
                <p class="${titleClass}">${task.title}</p>
                <div class="flex items-center gap-4 text-xs mt-1.5">
                  <span class="flex items-center gap-1.5 ${dateColor}">
                    ${isPast && !task.completed ? '<i class="fa-solid fa-circle-exclamation"></i>' : ''}
                    ${!filterDate ? `<span>${task.date}</span>` : ''}
                    <span class="flex items-center gap-1"><i class="fa-regular fa-clock"></i> ${task.time}</span>
                  </span>
                  ${!task.completed ? `
                  <span class="text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-md flex items-center gap-1 font-medium border border-indigo-100">
                    <i class="fa-solid fa-bell"></i> ${reminderText}
                  </span>` : ''}
                </div>
              </div>
            </div>
            <button onclick="deleteTask('${task.id}')" class="p-2.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors ml-2 flex-shrink-0 opacity-0 group-hover:opacity-100 md:opacity-100">
              <i class="fa-solid fa-trash-can text-lg"></i>
            </button>
          </div>
        `;
      });
    }

    // === タスク操作 ===
    function addTask(e) {
      e.preventDefault();
      const title = document.getElementById('task-title').value.trim();
      const date = document.getElementById('task-date').value;
      const time = document.getElementById('task-time').value;
      const reminderOffset = document.getElementById('task-reminder').value;

      if (!title || !date || !time) return;

      const newTask = {
        id: 'task_' + Date.now(),
        title: title,
        date: date,
        time: time,
        reminderOffset: reminderOffset,
        completed: false,
        notified: false
      };

      tasks.push(newTask);
      tasks.sort((a, b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));
      
      saveData();
      updateUI();

      document.getElementById('task-title').value = '';
      document.getElementById('submit-btn').disabled = true;
    }

    function toggleComplete(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
      saveData();
      updateUI();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveData();
      updateUI();
    }

    // === 通知・リマインダー ===
    function playNotificationSound() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();

        // ★ここで3回連続で鳴るように設定しています
        const repeatCount = 3; 

        for (let i = 0; i < repeatCount; i++) {
          const startTime = ctx.currentTime + (i * 0.8);

          const osc = ctx.createOscillator();
          const gainNode = ctx.createGain();

          osc.type = 'sine';
          osc.frequency.setValueAtTime(880, startTime);
          osc.frequency.exponentialRampToValueAtTime(1760, startTime + 0.1);

          gainNode.gain.setValueAtTime(0.2, startTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.3);

          osc.connect(gainNode);
          gainNode.connect(ctx.destination);

          osc.start(startTime);
          osc.stop(startTime + 0.3);
        }
      } catch (e) {
        console.error("Audio play failed", e);
      }
    }

    function showToast(title, timeStr) {
      const container = document.getElementById('toast-container');
      const toastId = 'toast_' + Date.now();
      
      const toast = document.createElement('div');
      toast.id = toastId;
      toast.className = 'bg-white border-l-4 border-indigo-500 rounded-xl shadow-2xl p-4 flex items-start gap-3 animate-bounce-short pointer-events-auto';
      
      toast.innerHTML = `
        <div class="bg-indigo-100 text-indigo-600 p-2.5 rounded-full flex-shrink-0 mt-0.5">
          <i class="fa-solid fa-bell animate-pulse"></i>
        </div>
        <div class="flex-1 pt-0.5">
          <h4 class="font-bold text-slate-800 text-sm">${title}</h4>
          <p class="text-xs font-medium text-slate-500 mt-1">${timeStr}</p>
        </div>
        <button onclick="document.getElementById('${toastId}').remove()" class="text-slate-400 hover:text-slate-600 p-1 bg-slate-50 hover:bg-slate-100 rounded-lg transition-colors">
          <i class="fa-solid fa-xmark text-lg"></i>
        </button>
      `;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        if(document.getElementById(toastId)) {
          document.getElementById(toastId).remove();
        }
      }, 10000);
    }

    function triggerNotification(task) {
      const message = task.reminderOffset === "0" 
        ? `時間です: ${task.title}` 
        : `あと${task.reminderOffset}分で開始: ${task.title}`;

      playNotificationSound();

      if ("Notification" in window && Notification.permission === "granted") {
        new Notification("スケジュールリマインダー", {
          body: message,
          icon: "https://cdn-icons-png.flaticon.com/512/3602/3602145.png"
        });
      }

      showToast(message, `${task.date} ${task.time}`);
    }

    function checkReminders() {
      const now = new Date();
      let hasChanges = false;

      tasks = tasks.map(task => {
        if (task.completed || task.notified) return task;

        const taskDateTime = new Date(`${task.date}T${task.time}`);
        const reminderTime = new Date(taskDateTime.getTime() - parseInt(task.reminderOffset) * 60000);

        if (now >= reminderTime) {
          hasChanges = true;
          triggerNotification(task);
          return { ...task, notified: true };
        }
        return task;
      });

      if (hasChanges) {
        saveData();
      }
      
      if (now.getSeconds() % 60 < 10) { 
        renderTasks();
      }
    }

    function testNotification() {
      playNotificationSound();
      showToast("テスト通知です！", "時間はちゃんと設定されています");
      
      if ("Notification" in window && Notification.permission === "granted") {
        new Notification("テスト完了", {
          body: "通知は正常に動作しています。",
          icon: "https://cdn-icons-png.flaticon.com/512/3602/3602145.png"
        });
      }
    }

    init();

  </script>
</body>
</html>
